<!DOCTYPE html>
<html lang="bn">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2 class="form-title">Login</h2>

<form id="login">

<input name="email" type="email" placeholder="Email" required>

<input name="password" type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<script>

const API = "https://script.google.com/macros/s/AKfycbzIIeoV0cWS9oocplHqdz5xeylFuqe9x2qCc-wnm9Xv4CpwStA8g7A4mDFhyC_UJoc0CQ/exec";

document.getElementById("login").addEventListener("submit", function(e){

e.preventDefault();

const email = this.email.value.trim();
const password = this.password.value.trim();

/* LOGIN REQUEST */

fetch(API + "?action=login&email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(password))

.then(response => response.text())

.then(data => {

if(data.trim() === "success"){

/* SAVE LOGIN USER */

localStorage.setItem("user", email);

/* ADMIN CHECK */

if(email === "pallabguchhait03@gmail.com"){

window.location.href = "admin.html";

}

/* NORMAL USER */

else{

window.location.href = "dashboard.html";

}

}

else{

alert("Wrong email or password");

}

})

.catch(error => {

console.error(error);

alert("Server connection error");

});

});

</script>

</body>
</html>
