<link rel="stylesheet" href="style.css">
<h2>Admin Panel</h2>

<div class="admin-toolbar">
  <button onclick="loadPending()">Pending Poems</button>
  <button onclick="loadApproved()">Approved Poems</button>
  <button onclick="loadPendingStories()">Pending Stories</button>
  <button onclick="loadApprovedStories()">Approved Stories</button>
</div>

<div id="poems">Loading...</div>

<script>

/* LOGIN CHECK */
var user = localStorage.getItem("user");

if(!user){
  alert("Please login first");
  window.location="login.html";
}

if(user !== "pallabguchhait03@gmail.com"){
  alert("Admin only");
  window.location="index.html";
}

/* API */
var API="https://script.google.com/macros/s/AKfycby_DiBVclgMtxCUu_QdvSy6ySRPh-Zgnoryp6_mUSM8lMU8OpkrlqbCTHaw3usCOzSJZw/exec";

/* ================= POEMS ================= */

function loadPending(){
fetch(API+"?action=getPending")
.then(r=>r.json())
.then(data=>renderPoems(data,true));
}

function loadApproved(){
fetch(API+"?action=getPoems")
.then(r=>r.json())
.then(data=>renderPoems(data,false));
}

/* ================= STORIES ================= */

function loadPendingStories(){
fetch(API+"?action=getPendingStories")
.then(r=>r.json())
.then(data=>renderStories(data,true));
}

function loadApprovedStories(){
fetch(API+"?action=getStories")
.then(r=>r.json())
.then(data=>renderStories(data,false));
}

/* ================= RENDER POEMS ================= */

function renderPoems(data,isPending){

var html="";

if(!data || data.length===0){
html="<p class='no-data'>No poems found</p>";
}

data.forEach(function(p){

var poemText=(p.poem||"").replace(/\n/g,"<br>");

html+=`
<div class="admin-card">
<h3>${p.title}</h3>
<p>${poemText}</p>
<p><b>Author:</b> ${p.author}</p>

<div class="actions">
${isPending ? `<button onclick="approvePoem('${p.id}')">Approve</button>` : ""}
<button onclick="deletePoem('${p.id}')">Delete</button>
</div>

</div>
`;

});

document.getElementById("poems").innerHTML=html;
}

/* ================= RENDER STORIES ================= */

function renderStories(data,isPending){

var html="";

if(!data || data.length===0){
html="<p class='no-data'>No stories found</p>";
}

data.forEach(function(s){

var text=(s.story||"").replace(/\n/g,"<br>");

html+=`
<div class="admin-card">
<h3>${s.title}</h3>
<p>${text}</p>
<p><b>Author:</b> ${s.author}</p>

<div class="actions">
${isPending ? `<button onclick="approveStory('${s.id}')">Approve</button>` : ""}
<button onclick="deleteStory('${s.id}')">Delete</button>
</div>

</div>
`;

});

document.getElementById("poems").innerHTML=html;
}

/* ================= ACTIONS ================= */

function approvePoem(id){
fetch(API+"?action=approve&id="+id)
.then(()=>{ alert("Poem Approved"); loadPending(); });
}

function deletePoem(id){
if(!confirm("Delete this poem?")) return;
fetch(API+"?action=delete&id="+id)
.then(()=>{ alert("Deleted"); loadPending(); });
}

function approveStory(id){
fetch(API+"?action=approveStory&id="+id)
.then(()=>{ alert("Story Approved"); loadPendingStories(); });
}

function deleteStory(id){
if(!confirm("Delete this story?")) return;
fetch(API+"?action=deleteStory&id="+id)
.then(()=>{ alert("Deleted"); loadPendingStories(); });
}

/* INITIAL */
loadPending();

</script>
