<h2>Admin Panel</h2>

<div id="poems"></div>

<script>

/* LOGIN CHECK */

var user = localStorage.getItem("user");

if(!user){
alert("Please login first");
window.location="login.html";
throw new Error("Not logged in");
}

/* ADMIN CHECK */

if(user !== "pallabguchhait03@gmail.com"){
alert("Admin only");
window.location="index.html";
throw new Error("Not admin");
}

/* API */

var API="https://script.google.com/macros/s/AKfycbxurahgydHBwjxaRo5lJug28FSEF1Wf-dE5M5Rbae83bAC-nKPqsPRtkW5qaRi0UXgE7Q/exec";


function load(){

fetch(API+"?action=getPending")

.then(r=>r.json())

.then(data=>{

var html="";

if(data.length===0){
html="<p>No pending poems</p>";
}

data.forEach(function(p){

html+=`

<h3>${p.title}</h3>

<p>${p.poem}</p>

<p><b>${p.author}</b></p>

<button onclick="approve('${p.id}')">Approve</button>

<hr>

`;

});

document.getElementById("poems").innerHTML=html;

});

}

load();


function approve(id){

fetch(API+"?action=approve&id="+id)

.then(r=>r.text())

.then(d=>{

alert("Poem Approved");

load();

});

}

</script>
