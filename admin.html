<h2>Admin Panel</h2>

<div class="admin-toolbar">
  <button onclick="loadPending()">Pending</button>
  <button onclick="loadApproved()">Approved</button>
</div>

<div id="poems">Loading...</div>

<script>

/* LOGIN CHECK */
var user = localStorage.getItem("user");

if(!user){
  alert("Please login first");
  window.location="login.html";
}

/* ADMIN CHECK */
if(user !== "pallabguchhait03@gmail.com"){
  alert("Admin only");
  window.location="index.html";
}

/* API */
var API="https://script.google.com/macros/s/AKfycbzIIeoV0cWS9oocplHqdz5xeylFuqe9x2qCc-wnm9Xv4CpwStA8g7A4mDFhyC_UJoc0CQ/exec";


/* LOAD PENDING */

function loadPending(){

fetch(API+"?action=getPending")

.then(r=>r.json())

.then(data=>renderCards(data,true))

.catch(err=>{
document.getElementById("poems").innerHTML="Error loading data";
console.error(err);
});

}


/* LOAD APPROVED */

function loadApproved(){

fetch(API+"?action=getPoems")

.then(r=>r.json())

.then(data=>renderCards(data,false))

.catch(err=>{
document.getElementById("poems").innerHTML="Error loading data";
console.error(err);
});

}


/* CARD RENDER */

function renderCards(data,isPending){

var html="";

if(!data || data.length===0){
html="<p class='no-data'>No data found</p>";
}

data.forEach(function(p){

html+=`
<div class="admin-card">

<h3>${p.title}</h3>

<p class="poem-text">${p.poem}</p>

<p class="author">Author: ${p.author}</p>

<div class="actions">

${isPending ? `<button class="approve" onclick="approve('${p.id}')">Approve</button>` : ""}

<button class="delete" onclick="removePoem('${p.id}')">Delete</button>

</div>

</div>
`;

});

document.getElementById("poems").innerHTML=html;

}


/* APPROVE */

function approve(id){

fetch(API+"?action=approve&id="+id)

.then(r=>r.text())

.then(()=>{
alert("Approved");
loadPending();
});

}


/* DELETE */

function removePoem(id){

if(!confirm("Delete this poem?")) return;

fetch(API+"?action=delete&id="+id)

.then(r=>r.text())

.then(()=>{
alert("Deleted");
loadPending();
});

}


/* INITIAL LOAD */

loadPending();

</script>
