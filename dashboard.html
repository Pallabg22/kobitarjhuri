<!DOCTYPE html>
<html lang="bn">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>User Dashboard</h2>

<p id="welcome"></p>

<button onclick="logout()">Logout</button>

<hr>

<h3>Submit New Poem</h3>

<form id="poemForm">

<input name="title" placeholder="Poem Title" required>

<textarea name="poem" placeholder="Write your poem" required></textarea>

<button type="submit">Submit Poem</button>

</form>

<hr>

<h3>Submit Story / Novel</h3>

<form id="storyForm">

<input name="title" placeholder="Story / Novel Title" required>

<textarea name="story" placeholder="Write your story or novel" required></textarea>

<button type="submit">Submit Writing</button>

</form>

<hr>

<h3>Your Submitted Poems</h3>
<div id="myPoems">Loading...</div>

<h3>Your Submitted Stories</h3>
<div id="myStories">Loading...</div>

<script>

var user = localStorage.getItem("user");

if(!user){
alert("Please login first");
window.location="login.html";
}

document.getElementById("welcome").innerHTML="Welcome: "+user;

var url="https://script.google.com/macros/s/AKfycby_DiBVclgMtxCUu_QdvSy6ySRPh-Zgnoryp6_mUSM8lMU8OpkrlqbCTHaw3usCOzSJZw/exec";

/* SUBMIT POEM */

document.getElementById("poemForm").onsubmit=function(e){

e.preventDefault();

var form=new FormData(this);

fetch(url,{
method:"POST",
body:new URLSearchParams({
action:"submitPoem",
title:form.get("title"),
poem:form.get("poem"),
author:user
})
})
.then(r=>r.text())
.then(()=>{
alert("Poem submitted successfully");
this.reset();
loadPoems();
});

};


/* SUBMIT STORY */

document.getElementById("storyForm").onsubmit=function(e){

e.preventDefault();

var form=new FormData(this);

fetch(url,{
method:"POST",
body:new URLSearchParams({
action:"submitStory",
title:form.get("title"),
story:form.get("story"),
author:user
})
})
.then(r=>r.text())
.then(()=>{
alert("Story submitted successfully");
this.reset();
loadStories();
});

};


/* LOAD POEMS */

function loadPoems(){

fetch(url+"?action=getUserPoems&author="+encodeURIComponent(user))

.then(r=>r.json())

.then(data=>{

var html="";

if(!data || data.length===0){
html="<p>No poems submitted yet.</p>";
}

data.forEach(function(p){

var poemText = p.poem.replace(/\n/g,"<br>");

html+=`
<div class="poem-card">

<h4>${p.title}</h4>

<p class="poem-text">${poemText}</p>

<p>Status: <b>${p.status}</b></p>

</div>
`;

});

document.getElementById("myPoems").innerHTML=html;

})

.catch(()=>{
document.getElementById("myPoems").innerHTML="Error loading poems";
});

}


/* LOAD STORIES */

function loadStories(){

fetch(url+"?action=getUserStories&author="+encodeURIComponent(user))

.then(r=>r.json())

.then(data=>{

var html="";

if(!data || data.length===0){
html="<p>No stories submitted yet.</p>";
}

data.forEach(function(s){

var storyText = s.story.replace(/\n/g,"<br>");

html+=`
<div class="poem-card">

<h4>${s.title}</h4>

<p class="poem-text">${storyText}</p>

<p>Status: <b>${s.status}</b></p>

</div>
`;

});

document.getElementById("myStories").innerHTML=html;

})

.catch(()=>{
document.getElementById("myStories").innerHTML="Error loading stories";
});

}


/* LOGOUT */

function logout(){
localStorage.removeItem("user");
window.location="login.html";
}


/* LOAD DATA ON PAGE OPEN */

loadPoems();
loadStories();

</script>

</body>
</html>
